<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0E3863">
    <title>Offline - AHHC Portal</title>
    <style>
        body {
            font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f8fa;
            color: #102a43;
        }
        .offline-shell {
            max-width: 520px;
            width: 100%;
            padding: 2rem;
            margin: 1rem;
            background: white;
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(14, 56, 99, 0.12);
            text-align: center;
            border: 1px solid rgba(14, 56, 99, 0.08);
        }
        .offline-shell h1 {
            margin-bottom: 1rem;
            font-size: 2rem;
        }
        .offline-shell p {
            margin-bottom: 1.5rem;
            color: #64748b;
            line-height: 1.65;
        }
        .offline-shell a,
        .offline-shell button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.95rem 1.35rem;
            border-radius: 12px;
            background: #1699A1;
            color: white;
            text-decoration: none;
            border: none;
            font-weight: 700;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .offline-shell button:hover,
        .offline-shell a:hover {
            transform: translateY(-1px);
            background: #0f7c88;
        }
        .offline-status {
            margin-top: 1rem;
            color: #94a3b8;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <main class="offline-shell">
        <h1>You're offline</h1>
        <p>The AHHC Portal is not able to load right now because your connection is unavailable. You can keep using the app once you reconnect.</p>
        <button onclick="window.location.reload();">Try again</button>
        <div class="offline-status">Your most recent pages and static assets are cached for next time.</div>
    </main>
</body>
</html>
